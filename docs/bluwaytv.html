<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BluWay | Sin límites</title>
  <link rel="icon" type="image/jpeg" href="imagenes/icono.jpg">

  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {background: linear-gradient(135deg, #050505, #0a0f1c); color: #fff; overflow-x: hidden;}
    header {background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 20px 50px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
      border-bottom: 1px solid #00f0ff40; box-shadow: 0 0 15px #00f0ff30;}
    header h1 {font-size: 1.8em; color: #00f0ff; letter-spacing: 2px; text-shadow: 0 0 10px #00f0ff;}
    nav a {color: #a0a0a0; margin-left: 30px; text-decoration: none; transition: 0.3s;}
    nav a:hover {color: #00f0ff; text-shadow: 0 0 10px #00f0ff;}
    .hero {text-align: center; padding: 100px 20px;
      background: url('https://images.unsplash.com/photo-1593642532973-d31b6557fa68?auto=format&fit=crop&w=1600&q=80') no-repeat center center/cover; position: relative;}
    .hero::before {content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7);}
    .hero h2, .hero p {position: relative;}
    .hero h2 {font-size: 3em; color: #00f0ff; text-shadow: 0 0 20px #00f0ff;}
    .hero p {font-size: 1.2em; color: #ddd; margin-top: 15px;}
    .product-section {padding: 60px 40px;}
    .section-title {text-align: center; color: #00f0ff; font-size: 2em; margin-bottom: 40px; text-shadow: 0 0 10px #00f0ff;}
    .product-grid {display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px;}
    .product-card {background: #081733; border: 1px solid #00f0ff40; border-radius: 15px; overflow: hidden;
      transition: 0.3s; box-shadow: 0 0 10px #00f0ff20;}
    .product-card:hover {transform: translateY(-8px); box-shadow: 0 0 25px #00f0ff60;}
    .product-card img {width: 100%; height: 280px; object-fit: contain; background-color: #000; border-bottom: 1px solid #00f0ff30;}
    .product-info {padding: 20px; text-align: center;}
    .product-info h3 {color: #00f0ff; font-size: 1.2em; margin-bottom: 10px;}
    .product-info p {color: #bbb; font-size: 0.9em; margin-bottom: 15px;}
    .price {color: #fff; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;}
    .btn {background: #00f0ff; color: #000; border: none; padding: 10px 20px; border-radius: 25px;
      font-weight: bold; cursor: pointer; transition: 0.3s;}
    .btn:hover {background: #fff; color: #00f0ff; box-shadow: 0 0 20px #00f0ff;}
    footer {text-align: center; padding: 25px; background: #000; border-top: 1px solid #00f0ff30;
      color: #00f0ff; box-shadow: 0 -5px 25px #00f0ff20; font-size: 0.9em;}
    /* --- MODAL DE COMPRA --- */
    .modal {position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.3s;}
    .modal.active {visibility: visible; opacity: 1;}
    .modal-content {background: #0a0f1c; border: 1px solid #00f0ff40; border-radius: 15px; padding: 30px;
      text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 25px #00f0ff40;}
    .modal-content h3 {color: #00f0ff; margin-bottom: 20px;}
    select, button.pay-btn {margin: 10px 0; padding: 10px; border-radius: 10px; border: none; width: 100%; font-size: 1em;}
    select {background: #000; color: #00f0ff; border: 1px solid #00f0ff80;}
    button.pay-btn {background: #00f0ff; color: #000; font-weight: bold; cursor: pointer;}
    button.close {background: none; color: #888; border: none; cursor: pointer; margin-top: 10px;}
  </style>
</head>
<body>

<header>
  <h1>Streamin</h1>
<nav>
<a href="index.html">Inicio</a>
<a href="#futbol">Fútbol</a>
<a href="#musica">Música</a>
<a href="#canales">Canales</a>
</nav>
</header>


<section class="tv-section">

<h2 class="section-title">BluWay TV</h2>
<div id="listaCanales" class="product-grid">
</div>
<video id="player" controls style="
width:100%;
height:600px;
background:black;
border-radius:20px;
border:2px solid #00f0ff;
box-shadow:0 0 30px #00f0ff;
display:none;">
</video>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<script>

const video = document.getElementById("player");
const lista = document.getElementById("listaCanales");


const canales = {

futbol:[
{
nombre:"World Cup",
url:"https://tv3ecuador.site/hls/stream/index.m3u8"
},
{
nombre:"fauld",
url:"http://23.237.104.106:8080/USA_FOX_DEPORTES/index.m3u8"
}
],


musica:[
{
nombre:"Music Radio",
url:"https://stream.studiorhedenlive.nl/hlstv/stream.m3u8"
},
{
nombre:"Music 2",
url:"https://cdn.40mediagroup.com/live/c7eds/Totalmusic/SA_LIVE_hls_enc/master.m3u8"
}
],


canales:[
{
nombre:"TV Color",
url:"https://video.compuwebecuador.com:3067/live/tvcolorlive.m3u8"
},
{
nombre:"Capricho TV",
url:"https://video.compuwebecuador.com:3783/live/caprichotvlive.m3u8"
},
{
nombre:"Korea del Norte",
url:"https://kctv.koryofront.org/stream/index.m3u8"
},
{
nombre:"Teleamazonas",
url:"https://teleamazonas-live.cdn.vustreams.com/live/fd4ab346-b4e3-4628-abf0-b5a1bc192428/live.isml/fd4ab346-b4e3-4628-abf0-b5a1bc192428.m3u8"
},
{
nombre:"Ecuavisa",
url:"https://jireh-3-hls-video-us-isp.dps.live/hls-video/c54ac2799874375c81c1672abb700870537c5223/ecuavisa/ecuavisa.smil/playlist.m3u8?dpssid=b219608142656a340fe1c7d98&sid=ba5t1l1xb219220539266a340fe1c7d96&ndvc=1"
},
{
nombre:"Paramount EN",
url:"https://cdn.haititivi.net/PARAMOUNT-CHANNEL/index.m3u8"
},
{
nombre:"CLasic",
url:"https://bbc-classicdrwho-1-us.roku.wurl.tv/playlist.m3u8"
}

]

};



function cargarLista(tipo){


lista.innerHTML="";


canales[tipo].forEach(c=>{


let boton=document.createElement("button");


boton.className="btn";

boton.innerHTML=c.nombre;


boton.onclick=()=>{

reproducir(c.url);

};


lista.appendChild(boton);


});


}



function reproducir(url){


video.style.display="block";


if(Hls.isSupported()){


let hls=new Hls();


hls.loadSource(url);

hls.attachMedia(video);


hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{

video.play();

});


}

else{


video.src=url;

}


}



document
.querySelector('a[href="#futbol"]')
.onclick=()=>{

cargarLista("futbol");

};


document
.querySelector('a[href="#musica"]')
.onclick=()=>{

cargarLista("musica");

};


document
.querySelector('a[href="#canales"]')
.onclick=()=>{

cargarLista("canales");

};


</script>

</section>

</body>
</html>
