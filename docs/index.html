<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BluWay | Sin Limites</title>
  <link rel="icon" type="image/jpeg" href="imagenes/icono.jpg">

  <style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif;}
    body {background: linear-gradient(135deg, #050505, #0a0f1c); color: #fff; overflow-x: hidden;}
    header {background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); padding: 20px 50px;
      display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0;
      border-bottom: 1px solid #00f0ff40; box-shadow: 0 0 15px #00f0ff30;}
    header h1 {font-size: 1.8em; color: #00f0ff; letter-spacing: 2px; text-shadow: 0 0 10px #00f0ff;}
    nav a {color: #a0a0a0; margin-left: 30px; text-decoration: none; transition: 0.3s;}
    nav a:hover {color: #00f0ff; text-shadow: 0 0 10px #00f0ff;}
    .hero {text-align: center; padding: 70px 20px;
     background: url('https://loremflickr.com/1600/900/shop') no-repeat center center/cover; position: relative;}
    .hero::before {content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7);}
    .hero h2, .hero p {position: relative;}
    .hero h2 {font-size: 3em; color: #00f0ff; text-shadow: 0 0 20px #00f0ff;}
    .hero p {font-size: 1.2em; color: #ddd; margin-top: 15px;}
    .product-section {padding: 60px 40px;}
    .section-title {text-align: center; color: #00f0ff; font-size: 2em; margin-bottom: 40px; text-shadow: 0 0 10px #00f0ff;}
    .product-card {background: #081733; border: 1px solid #00f0ff40; border-radius: 15px; overflow: hidden;
      transition: 0.3s; box-shadow: 0 0 10px #00f0ff20; flex: 0 0 280px;}
    .product-card:hover {transform: translateY(-8px); box-shadow: 0 0 25px #00f0ff60;}
    .product-card img {width: 100%; height: 220px; object-fit: contain; background-color: #000; border-bottom: 1px solid #00f0ff30;}
    .product-info {padding: 20px; text-align: center;}
    .product-info h3 {color: #00f0ff; font-size: 1.2em; margin-bottom: 10px;}
    .product-info p {color: #bbb; font-size: 0.9em; margin-bottom: 15px;}
    .price {color: #fff; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;}
    .btn {background: #00f0ff; color: #000; border: none; padding: 10px 20px; border-radius: 25px;
      font-weight: bold; cursor: pointer; transition: 0.3s;}
    .btn:hover {background: #fff; color: #00f0ff; box-shadow: 0 0 20px #00f0ff;}
    footer {text-align: center; padding: 25px; background: #000; border-top: 1px solid #00f0ff30;
      color: #00f0ff; box-shadow: 0 -5px 25px #00f0ff20; font-size: 0.9em;}
    /* --- MODAL DE COMPRA --- */
    .modal {position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; visibility: hidden; opacity: 0; transition: 0.3s;}
    .modal.active {visibility: visible; opacity: 1;}
    .modal-content {background: #0a0f1c; border: 1px solid #00f0ff40; border-radius: 15px; padding: 30px;
      text-align: center; width: 90%; max-width: 400px; box-shadow: 0 0 25px #00f0ff40;}
    .modal-content h3 {color: #00f0ff; margin-bottom: 20px;}
    select, button.pay-btn {margin: 10px 0; padding: 10px; border-radius: 10px; border: none; width: 100%; font-size: 1em;}
    select {background: #000; color: #00f0ff; border: 1px solid #00f0ff80;}
    button.pay-btn {background: #00f0ff; color: #000; font-weight: bold; cursor: pointer;}
    button.close {background: none; color: #888; border: none; cursor: pointer; margin-top: 10px;}
    /* --- SLIDER --- */
    .product-slider {display: flex; overflow-x: auto; scroll-behavior: smooth; gap: 30px; padding: 20px;}
    .product-slider::-webkit-scrollbar {height: 8px;}
    .product-slider::-webkit-scrollbar-thumb {background: #00f0ff80; border-radius: 10px;}
    .product-slider::-webkit-scrollbar-track {background: #081733;}

    /* =========================
   BOTONES SLIDER PC
========================= */

.slider-container{
position:relative;
width:100%;
}


.slider-btn{

position:absolute;

top:50%;

transform:translateY(-50%);

width:42px;
height:70px;

border:none;

background:rgba(0,0,0,0.65);

color:white;

font-size:22px;

cursor:pointer;

z-index:20;

opacity:0;

transition:0.25s;

display:flex;
align-items:center;
justify-content:center;

backdrop-filter:blur(8px);

box-shadow:
0 0 15px rgba(0,240,255,0.25);

}


.slider-btn.left{

left:0;

}



.slider-btn.right{

right:0;

}



/* aparece con mouse en computadora */

.slider-container:hover .slider-btn{

opacity:1;

}



/* celular sin botones */

@media(max-width:768px){

.slider-btn{

display:none;
}

}


@media(max-width:768px){

.hero{
    background-size: cover;
    background-position: center;
    min-height: 300px;
}

}
  </style>
</head>
<body>

<header>
  <h1>BluWay | Sin Limites</h1>
<nav>
  <a href="bluwaytv.html">BluWay TV</a>
  <a href="#">Inicio</a>
  <a href="#">Soporte</a>
</nav>
</header>

<section class="hero">
  <h2>Envíos Ambato</h2>
  <p>Estilo y precio en un solo lugar.WEB EN FASE DE PRUEBAS</p>
</section>
<section class="product-section">

<h2 class="section-title">
Productos Disponibles
</h2>


<div class="slider-container">
  
<button class="slider-btn left" id="btnLeft">
‹
</button>

<div class="product-slider" id="productosFirebase">
</div>

<button class="slider-btn right" id="btnRight">
›
</button>


</div>
</section>
<footer>
  © 2026 BluWay | Sin Límites
</footer>

</body>
</html>

<!-- MODAL DATOS DEL PEDIDO -->
<div class="modal" id="pedidoModal">
  <div class="modal-content">

    <h3>Datos de Entrega</h3>

    <p id="productoPedido"
       style="
       color:#00f0ff;
       font-weight:bold;
       margin-bottom:15px;
       font-size:16px;
       ">
    </p>
    <input
     type="text"
     id="direccion"
     readonly
     placeholder="Obteniendo ubicación..."
     style="width:100%;padding:12px;margin:10px 0;background:#000;color:#fff;border:1px solid #00f0ff;border-radius:10px;"
    >

    <input
      type="text"
      id="telefono"
      placeholder="Número de teléfono"
      style="width:100%;padding:12px;margin:10px 0;background:#000;color:#fff;border:1px solid #00f0ff;border-radius:10px;"
    >

    <input
      type="text"
      id="cedula"
      placeholder="Número de cédula"
      style="width:100%;padding:12px;margin:10px 0;background:#000;color:#fff;border:1px solid #00f0ff;border-radius:10px;"
    >

<button 
type="button"
class="pay-btn" 
id="generarPedido">
Generar Pedido
</button>

    <button class="close" onclick="cerrarModal()">
      Cancelar
    </button>

  </div>
</div>

<!-- MODAL QR -->
<div class="modal" id="qrModal">
  <div class="modal-content">

    <h3>Pedido Generado</h3>

    <div id="qrcode"
         style="display:flex;justify-content:center;margin:20px;">
    </div>

    <button class="pay-btn" onclick="guardarQR()">
      Guardar QR
    </button>

    <button class="close" onclick="cancelarPedido()">
      Cancelar Pedido
    </button>

  </div>
</div>
<script>
const SUPABASE_URL = "https://nyloxoancdspgmhfaxgu.supabase.co";
const SUPABASE_KEY = "sb_publishable_L5e4j8t_hWq1Owd2Zi2JOQ_h0PECtSy";

fetch(`${SUPABASE_URL}/rest/v1/productos`, {
  method: "GET",
  headers: {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
})
.then(res => res.json())
.then(data => {

  console.log("Supabase conectado:", data);

  const contenedor = document.getElementById("productosFirebase");

  // limpia productos originales si quieres usar SOLO Supabase
  contenedor.innerHTML = "";

  if (!data || data.length === 0) {
    contenedor.innerHTML = "<p>No hay productos en Supabase</p>";
    return;
  }

  data.forEach(producto => {
    contenedor.innerHTML += `
      <div class="product-card">
        <img src="${producto.imagen || 'imagenes/Camiseta.jpg'}">
        <div class="product-info">
          <h3>${producto.nombre}</h3>
          <p>${producto.descripcion || ""}</p>
          <div class="price">$${producto.precio}</div>
          <button class="btn comprar-btn">Comprar</button>
        </div>
      </div>
    `;
  });

})
.catch(error => {
  console.log("Error Supabase:", error);
});

let productoSeleccionado = "";

let latitudCliente = "";
let longitudCliente = "";

/* =========================
   OBTENER UBICACION
========================= */

async function obtenerUbicacion() {

    const campoDireccion =
    document.getElementById("direccion");

    campoDireccion.value =
    "Solicitando ubicación...";

    if (!navigator.geolocation) {

        campoDireccion.value =
        "GPS no disponible";

        return;
    }

navigator.geolocation.getCurrentPosition(

    async function(posicion) {

        const lat =
        posicion.coords.latitude;

        const lon =
        posicion.coords.longitude;

        /* GUARDAR GPS EXACTO */
        latitudCliente = lat;
        longitudCliente = lon;

        try {

            const respuesta =
            await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
            );

            const datos =
            await respuesta.json();

            campoDireccion.value =
            datos.display_name ||
            `${lat}, ${lon}`;

        }

        catch(error) {

            campoDireccion.value =
            `${lat}, ${lon}`;

        }

    },

        function(error) {

            campoDireccion.value =
            "Ubicación no permitida";

        }

    );

}

/* =========================
   BOTONES COMPRAR
========================= */

document.addEventListener("click", function(e){


if(e.target.classList.contains("comprar-btn")){


productoSeleccionado =
e.target.parentElement.querySelector("h3").innerText;


document.getElementById("productoPedido")
.innerText =
"Producto: " + productoSeleccionado;


document.getElementById("direccion").value =
"Obteniendo ubicación...";


document.getElementById("pedidoModal")
.classList.add("active");


obtenerUbicacion();


}


});

/* =========================
   CERRAR MODAL
========================= */

function cerrarModal(){

    document.getElementById("pedidoModal")
    .classList.remove("active");

}

/* =========================
   GENERAR PEDIDO
========================= */

document.getElementById("generarPedido")
.addEventListener("click", function(){

    let direccion =
    document.getElementById("direccion").value.trim();

    let telefono =
    document.getElementById("telefono").value.replace(/\s+/g,'');

    let cedula =
    document.getElementById("cedula").value.replace(/\s+/g,'');
    /* VALIDAR TELEFONO */
if(!/^\d{7,15}$/.test(telefono)){

    alert("Ingrese un número de teléfono válido.");

    return;

}

/* VALIDAR CEDULA */
if(!/^\d{10,13}$/.test(cedula)){

    alert("Ingrese una cédula válida.");

    return;

}

   if(
    !direccion ||
    direccion.includes("Obteniendo") ||
    direccion.includes("Solicitando") ||
    direccion.includes("Ubicación no permitida") ||
    direccion.includes("GPS no disponible") ||
    !telefono ||
    !cedula
){

    alert("Espere a que se obtenga la ubicación y complete todos los campos.");

    return;
}

    let fecha =
    new Date().toLocaleString();

    let pedidoID =
    "BLW-" + Date.now();

    let datos =

`PEDIDO BLUWAY

ID: ${pedidoID}

Producto: ${productoSeleccionado}

Direccion:
${direccion}

Telefono:
${telefono}

Cedula:
${cedula}

GPS:
${latitudCliente}, ${longitudCliente}

GOOGLE MAPS:
https://maps.google.com/?q=${latitudCliente},${longitudCliente}

Fecha:
${fecha}`;

console.log(datos);
alert("Generando pedido...");
/* ENVIAR PEDIDO A FORMSPREE */

fetch("https://formspree.io/f/mnjkaaqq", {

    method:"POST",

    headers:{
        "Content-Type":"application/x-www-form-urlencoded"
    },

    body:new URLSearchParams({
        pedido: datos
    })

})
.then(response=>{


    if(!response.ok){

        throw new Error("Error del servidor Formspree");

    }


    alert("✅ Pedido enviado correctamente a BluWay");


    document.getElementById("pedidoModal")
    .classList.remove("active");


    document.getElementById("qrModal")
    .classList.add("active");


    const qrContainer =
    document.getElementById("qrcode");


    qrContainer.innerHTML = "";


    const qrURL =
    "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" +
    encodeURIComponent(datos);



    qrContainer.innerHTML = `

    <img
    id="qrImage"
    src="${qrURL}"
    style="
    width:250px;
    height:250px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px #00f0ff;
    ">

    `;


})


.catch(error=>{

    console.log(error);

    // Si Formspree ya recibió el pedido pero falla la respuesta
    alert("✅ Pedido procesado. Guarde el QR para recibir su pedido");

    document.getElementById("pedidoModal")
    .classList.remove("active");


    document.getElementById("qrModal")
    .classList.add("active");


    const qrContainer =
    document.getElementById("qrcode");


    qrContainer.innerHTML = "";


    const qrURL =
    "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" +
    encodeURIComponent(datos);


    qrContainer.innerHTML = `

    <img
    id="qrImage"
    src="${qrURL}"
    style="
    width:250px;
    height:250px;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 15px #00f0ff;
    ">

    `;

});

});

/* =========================
   GUARDAR QR
========================= */

function guardarQR(){

    const imagen =
    document.querySelector("#qrImage");

    if(!imagen){

        alert("No existe QR para guardar");

        return;
    }

    const enlace =
    document.createElement("a");

    enlace.href =
    imagen.src;

    enlace.download =
    "pedido-bluway.png";

    document.body.appendChild(enlace);

    enlace.click();

    document.body.removeChild(enlace);

}

/* =========================
   CANCELAR PEDIDO
========================= */

function cancelarPedido(){

    document.getElementById("qrModal")
    .classList.remove("active");

    document.getElementById("direccion").value = "";
    document.getElementById("telefono").value = "";
    document.getElementById("cedula").value = "";

    /* LIMPIAR PRODUCTO */
    document.getElementById("productoPedido")
    .innerText = "";

    /* LIMPIAR GPS */
    latitudCliente = "";
    longitudCliente = "";

    /* LIMPIAR QR */
    document.getElementById("qrcode").innerHTML = "";

}
/* =========================
   CONTROL SLIDER BOTONES PC
========================= */

const slider =
document.getElementById("productosFirebase");


const btnLeft =
document.getElementById("btnLeft");


const btnRight =
document.getElementById("btnRight");



btnLeft.addEventListener("click",()=>{


    slider.scrollBy({

        left:-300,

        behavior:"smooth"

    });


});



btnRight.addEventListener("click",()=>{


    slider.scrollBy({

        left:300,

        behavior:"smooth"

    });


});

</script>

</body>
</html>
